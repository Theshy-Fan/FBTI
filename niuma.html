<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你是什么牛马？| 牛马人格鉴定</title>
    <meta name="description" content="15道题鉴定你是哪种牛马，准到让你怀疑人生！">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow-x: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 100px rgba(245, 87, 108, 0.1);
            max-width: 520px;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #f093fb, #f5576c, #ff9a9e, #f093fb);
            background-size: 300% 100%;
            animation: gradientMove 3s linear infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 40px 20px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .header::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(245, 87, 108, 0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .header h1 {
            font-size: 30px;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .header p {
            font-size: 13px;
            opacity: 0.8;
            position: relative;
            z-index: 1;
        }

        .content {
            padding: 30px 25px;
        }

        /* START SCREEN */
        .start-container {
            text-align: center;
            padding: 20px 10px;
        }

        .start-emoji {
            font-size: 90px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
            display: inline-block;
            filter: drop-shadow(0 10px 20px rgba(245, 87, 108, 0.3));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .start-title {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea, #f5576c, #ff9a9e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        .start-desc {
            font-size: 15px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.9;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f5576c 100%);
            background-size: 200% 100%;
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
            animation: btnShine 2s ease-in-out infinite;
        }

        @keyframes btnShine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .start-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 50px rgba(102, 126, 234, 0.5);
        }

        .tips {
            margin-top: 30px;
            padding: 16px 20px;
            background: linear-gradient(135deg, #fff5f5, #ffe0e0);
            border-radius: 16px;
            font-size: 13px;
            color: #d32f2f;
            border-left: 4px solid #f5576c;
        }

        .back-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: transparent;
            border: 2px solid #667eea;
            border-radius: 25px;
            font-size: 14px;
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #667eea;
            color: white;
        }

        /* QUESTION SCREEN */
        .question-container {
            display: none;
            min-height: 400px;
        }

        .question-container.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e9ecef;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2, #f5576c);
            background-size: 200% 100%;
            border-radius: 10px;
            transition: width 0.4s ease;
            animation: progressMove 2s linear infinite;
        }

        @keyframes progressMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .question-number {
            font-size: 14px;
            color: #667eea;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .question-number span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .question-text {
            font-size: 19px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 30px;
            line-height: 1.6;
            position: relative;
            padding-left: 20px;
        }

        .question-text::before {
            content: '▌';
            position: absolute;
            left: 0;
            top: 0;
            color: #f5576c;
            font-size: 16px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .option {
            padding: 18px 22px;
            background: #fff;
            border: 2px solid #e9ecef;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 15px;
            color: #495057;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(245, 87, 108, 0.05), transparent);
            transition: left 0.5s ease;
        }

        .option:hover::before {
            left: 100%;
        }

        .option:hover {
            border-color: #f5576c;
            background: #fff5f5;
            transform: translateX(8px);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.15);
        }

        .option.selected {
            border-color: #f5576c;
            background: linear-gradient(135deg, #fff5f5, #ffe0e0);
            color: #d32f2f;
            font-weight: 600;
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.2);
        }

        /* RESULT SCREEN */
        .result-container {
            display: none;
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        .result-container.active {
            display: block;
        }

        .result-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 25px 20px;
            margin: -30px -25px 20px -25px;
            border-radius: 0;
        }

        .result-emoji {
            font-size: 70px;
            margin-bottom: 10px;
            animation: bounce 1s ease infinite;
            display: inline-block;
            filter: drop-shadow(0 10px 30px rgba(245, 87, 108, 0.4));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .result-badge {
            display: inline-block;
            background: linear-gradient(135deg, #f5576c, #ff9a9e);
            color: white;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .result-title {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .result-subtitle {
            display: inline-block;
            background: linear-gradient(135deg, #f5576c, #ff9a9e);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .result-type {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 10px;
        }

        .result-type .tag {
            display: inline-block;
            background: rgba(245, 87, 108, 0.3);
            padding: 4px 10px;
            border-radius: 8px;
            margin: 0 5px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .result-main {
            padding: 0 10px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .result-score {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .result-score .score-value {
            font-size: 24px;
            font-weight: 900;
        }

        .result-card {
            background: #fff;
            border-radius: 20px;
            padding: 0;
            margin-bottom: 12px;
            text-align: left;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            border: 1px solid #f0f0f0;
            overflow: hidden;
        }

        .result-card .card-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-card .card-header .card-icon {
            font-size: 18px;
        }

        .result-card .card-header h3 {
            color: white;
            font-size: 15px;
            margin: 0;
        }

        .result-card .card-content {
            padding: 20px;
        }

        .result-card .card-content p {
            font-size: 14px;
            color: #666;
            line-height: 1.9;
            margin-bottom: 12px;
        }

        .result-card .card-content p:last-child {
            margin-bottom: 0;
        }

        .result-card p {
            font-size: 14px;
            color: #666;
            line-height: 1.9;
            margin-bottom: 12px;
        }

        .result-card p:last-child {
            margin-bottom: 0;
        }

        /* 扎心真相卡片 */
        .zhaxin-card {
            background: #fff;
            border-radius: 20px;
            padding: 0;
            margin-bottom: 12px;
            text-align: left;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            border: 1px solid #ffebee;
            overflow: hidden;
        }

        .zhaxin-card .card-header {
            background: linear-gradient(135deg, #f5576c, #ff9a9e);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .zhaxin-card .card-header .card-icon {
            font-size: 18px;
        }

        .zhaxin-card .card-header h3 {
            color: white;
            font-size: 15px;
            margin: 0;
        }

        .zhaxin-card .card-content {
            padding: 20px;
        }

        .zhaxin-card .card-content p {
            font-size: 14px;
            color: #d32f2f;
            line-height: 1.8;
            margin-bottom: 10px;
            padding: 12px;
            background: linear-gradient(135deg, #fff5f5, #ffebee);
            border-radius: 10px;
            border-left: 3px solid #f5576c;
        }

        .zhaxin-card .card-content p:last-child {
            margin-bottom: 0;
        }

        /* 画像卡片 */
        .portrait-card {
            background: #fff;
            border-radius: 20px;
            padding: 0;
            margin-bottom: 12px;
            text-align: left;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            border: 1px solid #e8f5e9;
            overflow: hidden;
        }

        .portrait-card .card-header {
            background: linear-gradient(135deg, #4caf50, #81c784);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .portrait-card .card-header .card-icon {
            font-size: 18px;
        }

        .portrait-card .card-header h3 {
            color: white;
            font-size: 15px;
            margin: 0;
        }

        .portrait-card .card-content {
            padding: 20px;
        }

        .portrait-card .portrait-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .portrait-card .portrait-tag {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            color: #2e7d32;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
        }

        .portrait-card .portrait-desc {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
            line-height: 1.8;
        }

        .result-card h3 {
            color: #1a1a2e;
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-card h3::before {
            content: '💬';
        }

        .result-card .highlight {
            display: block;
            color: #d32f2f;
            font-weight: 700;
            font-size: 14px;
            padding: 12px;
            background: linear-gradient(135deg, #fff5f5, #ffebee);
            border-radius: 10px;
            border-left: 3px solid #f5576c;
            margin: 10px 0;
            line-height: 1.6;
        }

        .result-card .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .result-card .tag-item {
            background: linear-gradient(135deg, #e9ecef, #dee2e6);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #495057;
        }

        .result-card .tag-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);

        }

        .result-advice {
            background: linear-gradient(135deg, #fff8e1, #ffecb3);
            border-radius: 16px;

            margin-bottom: 15px;
        }

        .result-advice h4 {
            color: #f57f17;
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-advice p {
            font-size: 14px;
            color: #666;
            line-height: 1.7;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;

        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }

        .share-btn {
            background: transparent;
            border: 2px solid #f5576c;
            color: #f5576c;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .share-btn:hover {
            background: #f5576c;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐴 你是什么牛马？</h1>
            <p>牛马人格全面鉴定 · 15题看清你自己</p>
        </div>

        <div class="content">
            <!-- START SCREEN -->
            <div class="start-container" id="startScreen">
                <div class="start-emoji">🐴💼</div>
                <div class="start-title">牛马人格鉴定</div>
                <div class="start-desc">
                    15道题，精准定位你在职场/生活中的位置<br>
                    <strong style="color: #f5576c;">顶级嘲讽 · 极度扎心 · 真实预警</strong>
                </div>
                <button class="start-btn" onclick="startTest()">🚀 开始鉴定</button>
                <div class="tips">
                    ⚠️ <strong>警告：</strong>结果过于真实，可能引起不适，心理脆弱者速速退散！
                </div>
                <button class="back-btn" onclick="goBack()">← 返回首页</button>
            </div>

            <!-- QUESTION SCREEN -->
            <div class="question-container" id="questionScreen">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="question-number">
                    <span id="questionNumber">第 1/15 题</span>
                    <span>牛马指数</span>
                </div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="options"></div>
            </div>

            <!-- RESULT SCREEN -->
            <div class="result-container" id="resultScreen">
                <div class="result-header">
                    <div class="result-emoji" id="resultEmoji"></div>
                    <div class="result-badge" id="resultBadge">鉴定报告</div>
                    <div class="result-title" id="resultTitle"></div>
                    <div class="result-subtitle" id="resultSubtitle"></div>
                    <div class="result-type" id="resultType"></div>
                </div>

                <div class="result-main">
                    <div class="result-score">
                        牛马指数
                        <span class="score-value" id="scoreValue">0</span>
                    </div>

                    <!-- 综合分析卡片 -->
                    <div class="result-card" id="resultCard">
                        <div class="card-header">
                            <span class="card-icon">📊</span>
                            <h3>综合分析</h3>
                        </div>
                        <div class="card-content" id="resultDesc"></div>
                    </div>

                    <!-- 扎心瞬间 -->
                    <div class="zhaxin-card" id="zhaxinCard">
                        <div class="card-header">
                            <span class="card-icon">💔</span>
                            <h3>扎心真相</h3>
                        </div>
                        <div class="card-content" id="zhaxinDesc"></div>
                    </div>

                    <!-- 你的画像 -->
                    <div class="portrait-card" id="portraitCard">
                        <div class="card-header">
                            <span class="card-icon">🪞</span>
                            <h3>你的画像</h3>
                        </div>
                        <div class="card-content" id="portraitDesc"></div>
                    </div>

                    <!-- 建议 -->
                    <div class="result-advice" id="resultAdvice">
                        <h4>💡 建议</h4>
                        <p id="adviceText"></p>
                    </div>

                    <!-- 底部按钮 -->
                    <div class="btn-group">
                        <button class="restart-btn" onclick="restartTest()">🔄 再测一次</button>
                        <button class="share-btn" onclick="goBack()">🏠 返回首页</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "周一早上闹钟响了，你的真实反应是？",
                options: [
                    { text: "再睡5分钟...然后睡到迟到", score: -5 },
                    { text: "准时起床，机械式开始打工", score: 3 },
                    { text: "昨晚失眠，现在处于半梦半醒", score: 0 },
                    { text: "自然醒，毕竟老子是自由职业（不是）", score: 6 }
                ]
            },
            {
                question: "领导在群里发了一条'有个急事'，你的第一反应？",
                options: [
                    { text: "装死，假装没看到，等别人回复", score: 5 },
                    { text: "内心咯噔一下，开始自我审视做错了什么", score: -3 },
                    { text: "积极响应：'收到！马上处理！'", score: 2 },
                    { text: "直接划走，关我屁事.jpg", score: 8 }
                ]
            },
            {
                question: "午休时同事叫你去吃饭，你通常？",
                options: [
                    { text: "婉拒，继续工作或者装忙", score: 1 },
                    { text: "开心干饭，社交能量+100", score: 7 },
                    { text: "点外卖，边吃边追剧最快乐", score: 4 },
                    { text: "独来独往，一个人去吃更自在", score: 5 }
                ]
            },
            {
                question: "下班点到了，但领导还没走，你会？",
                options: [
                    { text: "到点就走，谁也不惯着", score: 8 },
                    { text: "再看一眼领导，犹豫再三后走人", score: 3 },
                    { text: "再等半小时，表示我也很努力", score: 0 },
                    { text: "领导不走我不走，卷死他们", score: -3 }
                ]
            },
            {
                question: "发工资后你会第一时间？",
                options: [
                    { text: "还花呗/信用卡，然后看看还剩多少", score: -2 },
                    { text: "存起来理财，积少成多", score: 6 },
                    { text: "该吃吃该喝喝，犒劳自己", score: 3 },
                    { text: "记账复盘，分析每一笔去向", score: 5 }
                ]

        let currentQuestion = 0;
        let totalScore = 0;

        function startTest() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('questionScreen').classList.add('active');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('questionNumber').textContent = `第 ${currentQuestion + 1}/15 题`;
            document.getElementById('questionText').textContent = q.question;

            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;

            const optionsHtml = q.options.map((opt, i) =>
                `<div class="option" onclick="selectOption(${i})">${opt.text}</div>`
            ).join('');

            document.getElementById('options').innerHTML = optionsHtml;
        }

        function selectOption(index) {
            const score = questions[currentQuestion].options[index].score;
            totalScore += score;

            document.querySelectorAll('.option').forEach((el, i) => {
                if (i === index) el.classList.add('selected');
            });

            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < questions.length) {
                    showQuestion();
                } else {
                    showResult();
                }
            }, 500);
        }

        function showResult() {
            document.getElementById('questionScreen').classList.remove('active');
            document.getElementById('resultScreen').classList.add('active');

            let result = results[0];
            for (let r of results) {
                if (totalScore >= r.minScore && totalScore <= r.maxScore) {
                    result = r;
                    break;
                }
            }

            // 数字滚动动画
            animateValue('scoreValue', 0, totalScore, 1500);

            document.getElementById('resultEmoji').textContent = result.emoji;
            document.getElementById('resultTitle').textContent = result.title;
            document.getElementById('resultSubtitle').textContent = result.subtitle;
            document.getElementById('resultType').innerHTML = `<span class="tag">${result.tag}</span>`;

            // 综合分析卡片
            document.getElementById('resultDesc').innerHTML = result.desc;

            // 扎心真相卡片
            const zhaxinHtml = result.zhaxin.map(z => `<p>${z}</p>`).join('');
            document.getElementById('zhaxinDesc').innerHTML = zhaxinHtml;

            // 画像卡片
            const portraitTagsHtml = result.portrait.tags.map(tag =>
                `<span class="portrait-tag">${tag}</span>`
            ).join('');
            document.getElementById('portraitDesc').innerHTML =
                `<div class="portrait-tags">${portraitTagsHtml}</div>
                 <div class="portrait-desc">${result.portrait.desc}</div>`;

            // 建议
            document.getElementById('adviceText').textContent = result.advice;
        }

        function animateValue(id, start, end, duration) {
            let obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        function restartTest() {
            currentQuestion = 0;
            totalScore = 0;
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('questionScreen').classList.add('active');
            showQuestion();
        }

        function goBack() {
            window.location.href = 'index.html';
        }
