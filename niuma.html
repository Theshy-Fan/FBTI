    <script>
        const questions = [
            { question: "周一早上闹钟响了，你的反应是？", options: [{ text: "再睡5分钟...然后睡到迟到", score: -5 }, { text: "准时起床，机械打工魂", score: 3 }, { text: "失眠中，二次昏迷", score: 0 }, { text: "自然醒，毕竟自由职业（不是）", score: 6 }] },
            { question: "领导在群里发'有个急事'，你？", options: [{ text: "装死，等别人回复", score: 5 }, { text: "内心咯噔，开始自我怀疑", score: -3 }, { text: "秒回：收到！马上处理！", score: 2 }, { text: "直接划走，关我屁事", score: 8 }] },
            { question: "午休同事叫吃饭，你通常？", options: [{ text: "婉拒，继续装忙", score: 1 }, { text: "开心干饭，社交达人", score: 7 }, { text: "点外卖追剧，太香了", score: 4 }, { text: "一个人吃，更自在", score: 5 }] },
            { question: "下班点到了领导还没走，你会？", options: [{ text: "到点就走，谁也不惯着", score: 8 }, { text: "偷看领导，犹豫后走", score: 3 }, { text: "再等半小时，假装努力", score: 0 }, { text: "领导不走我不走，卷王", score: -3 }] },
            { question: "发工资后你第一件事？", options: [{ text: "还花呗/信用卡，然后吃土", score: -2 }, { text: "存起来，积少成多", score: 6 }, { text: "该吃吃该喝喝，犒劳自己", score: 3 }, { text: "记账复盘，分析每一笔", score: 5 }] },
            { question: "看到朋友圈晒年终奖/升职，你？", options: [{ text: "内心毫无波动，甚至想笑", score: 7 }, { text: "焦虑到失眠，怀疑人生", score: -5 }, { text: "表面点赞，内心柠檬精", score: 0 }, { text: "直接划走，关我屁事+1", score: 8 }] },
            { question: "同事把不属于你的工作推给你？", options: [{ text: "欣然接受，职场老好人", score: -3 }, { text: "找借口婉拒，态度坚决", score: 7 }, { text: "内心不爽但勉强答应", score: -1 }, { text: "表面答应，然后无限拖", score: 4 }] },
            { question: "周末两天的真实状态？", options: [{ text: "加班，或随时待命回消息", score: 0 }, { text: "在家躺尸，追剧虚度", score: 4 }, { text: "学习/搞副业/提升自己", score: 6 }, { text: "各种局排满，社交达人", score: 7 }] },
            { question: "如果中大奖1000万，你会？", options: [{ text: "立刻辞职，世界这么大我要去看看", score: 10 }, { text: "低调继续上班，假装没事", score: 2 }, { text: "换个轻松工作，继续混", score: 6 }, { text: "疯狂消费，先爽了再说", score: 4 }] },
            { question: "工作中遇到难题，你优先？", options: [{ text: "自己死磕，不到万不得已不求助", score: 3 }, { text: "甩锅给同事或推给实习生", score: -2 }, { text: "求助同事/百度/群聊，问就完事", score: 6 }, { text: "拖到最后，奇迹般解决", score: 4 }] },
            { question: "别人问'最近怎么样'，你常说？", options: [{ text: "好累啊/不想上班/想死", score: -3 }, { text: "还行吧/就那样/随便", score: 2 }, { text: "这个瓜你知道吗...", score: 5 }, { text: "我在准备搞个大事（但没行动）", score: 4 }] },

        const results = [
            { minScore: 130, maxScore: 999, title: "🐲 神兽之王", subtitle: "天选之人 · 宇宙宠儿", emoji: "🐲✨", tag: "SSS", zhaxin: ["别装了，你能有今天90%是因为运气好", "在真正的富人眼里，你就是个高级打工仔", "等你40岁再看看？35岁危机了解一下"], portrait: { tags: ["天选之人", "人生赢家", "命运宠儿", "出生罗马"], desc: "你属于那种'出生在罗马'的人，或者踩准了时代红利。别人在为生计奔波，你已经在考虑诗和远方。但别太得意，你的成功经验对普通人毫无参考价值。"}, analysis: "恭喜你！你他娘的就是传说中的天选之人！你可能已经实现了财富自由，或者正处于人生巅峰，每天醒来就是考虑今天去哪玩。但别急着高兴得太早——神兽再牛，不也是给人骑的吗？汗血宝马日行千里，最后还不是被人骑着去战场？你的风光背后，可能是无数个加班到凌晨的夜晚换来的，或者是祖上积德+运气爆棚+拆迁赔偿的结果。你的成功确实让人羡慕，但你要记住：这个世界上没有永远的赢家。万一哪天运气用完了，从神坛跌落，那可就是笑话了。保持低调，给自己留条后路，这才是明智之举。", advice: "虽然你现在很牛，但记得给自己留条后路。万一哪天运气用完了，至少还有Plan B。以及...别太嘚瑟，低调做人。" },
            { minScore: 110, maxScore: 129, title: "🦅 天马", subtitle: "自由飞翔 · 职场翱翔", emoji: "🦅🌟", tag: "SS", zhaxin: ["你只是运气比较好，别把运气当实力", "天马虽帅，也得给人骑", "小心哪天翅膀断了摔下来"], portrait: { tags: ["自由飞翔", "职场精英", "有前景", "有点东西"], desc: "你是那种有实力有运气的人，在职场中属于上游水平。但别太嘚瑟，这个社会变化快，今天是天马，明天可能是驽马。"}, analysis: "你是那种万里中无一的职场精英！在公司里，你是那种被人羡慕的存在——工资高、职位好、还有发展前景。但我必须残忍地告诉你：天马之所以能飞，是借了时代的风。没有这阵风，你可能就是一只普通的马。你现在的风光，更多是因为踩准了时代的红利，而不是你真的有那么厉害。这个社会变化很快，今天你是天马，明天可能就变成驽马。所以趁现在还有资本，多提升自己的核心竞争力，别把所有希望寄托在运气上。", advice: "保持学习，提升核心竞争力，别把所有希望寄托在运气上。" },
            { minScore: 90, maxScore: 109, title: "🐎 汗血宝马", subtitle: "顶级打工马 · 日行千里", emoji: "🐎💨", tag: "S+", zhaxin: ["再好的马也是给人骑的", "你的风光是用命换的", "小心变成下一个累死的千里马"], portrait: { tags: ["顶级打工", "能力出众", "压力大", "加班狂"], desc: "你是那种能力很强但也很辛苦的人。虽然收入不错，但每天加班到怀疑人生。别人觉得你风光，你知道自己有多累。"}, analysis: "你是那种典型的'高薪高压'人群！别人觉得你很风光——月入好几万、年底有年终奖、关键时刻能独当一面。但只有你自己知道，这些风光都是用命换来的。每天加班到凌晨，周末还要随时待命，客户一个电话就得起来改方案。你的身体已经开始报警了——掉头发、失眠、胃不好...但你不敢停，因为一旦停下来，可能就被人超越了。在这个内卷的时代，你就像一匹不停奔跑的汗血宝马，跑得越快，离终点就越近，但也越累。你真的该休息一下了。", advice: "身体是革命的本钱，别为了工作把命搭进去。适当休息，学会拒绝。" },
            { minScore: 70, maxScore: 89, title: "🦄 独角兽", subtitle: "稀有物种 · 锦鲤附体", emoji: "🦄🌟", tag: "S", zhaxin: ["独角兽之所以稀有，是因为不存在", "你只是运气好，不是能力强", "小心在自己的信息茧房里裸泳"], portrait: { tags: ["万中无一", "欧皇附体", "自带光环", "人生开挂"], desc: "你是那种喝水都能中奖的类型。但问题是把运气当实力，以为自己很牛逼。一旦运气用完，你就知道什么叫残忍。"}, analysis: "你是那种万里挑一的幸运儿！买彩票能中奖、抽奖必中、找工作能被HR追着要、连出门都能捡钱。但我必须提醒你：独角兽之所以稀有，是因为这玩意儿根本不存在！你可能自我感觉良好，觉得自己是天选之子。但醒醒吧，你只是运气好点而已。真正的独角兽公司死亡率高达99%，你以为你是例外？你现在的生活确实让人羡慕，但你的问题是把运气当实力。你以为是自己牛逼，其实只是比较幸运。一旦哪天运气用完，没有真本事支撑，你就知道什么叫残忍了。", advice: "趁运气还好的时候多提升真本事，别把所有鸡蛋放在运气这个篮子里。" },
            { minScore: 55, maxScore: 69, title: "🐴 千里马", subtitle: "潜力无限 · 蓄势待发", emoji: "🐴💨", tag: "A+", zhaxin: ["千里马常有，伯乐不常有", "有能力的人太多，凭什么是你？", "太低调就是懦弱，该显摆要显摆"], portrait: { tags: ["潜力股", "有能力", "怀才不遇", "需要机会"], desc: "你是那种'我很强但没人发现'的类型。你有一定能力，但问题是不够主动。这个时代，金子太多，伯乐是瞎子。"}, analysis: "你是那种'我很强但我不想说'的类型！在公司里，你属于那种有一定能力、但不太会表现自己的人。你觉得自己是金子，应该发光，但实际上这个社会金子太多了，而伯乐都是瞎的。你的能力确实不错，但你太低调了，觉得是金子总会发光。但这个时代，会干的不如会说的。你需要学会推销自己，不然真的会埋没到死。千里马常有，而伯乐不常有啊朋友。赛道太挤，卷王太多，小心变成'千里马的尸体'——死在通往成功的路上，还没人给你收尸。", advice: "学会推销自己，别光学技能。这个社会，会干的不如会说的。" },
            { minScore: 40, maxScore: 54, title: "🏇 赛马", subtitle: "中产打工马 · 赛道选手", emoji: "🏇🎯", tag: "A", zhaxin: ["赛马再快，也是被人骑着跑", "你只是比普通人强一点而已", "小心被更年轻更便宜的取代"], portrait: { tags: ["中产", "职场老手", "有点东西", "不太行"], desc: "你是那种中等偏上的人，在职场有一定地位，但也不算出类拔萃。属于那种'比上不足比下有余'的类型。"}, analysis: "你是那种典型的中产打工人！在公司里，你属于那种'还不错'的存在——有经验、有能力、薪资也还行。你不是最差的，但也不是最好的。你的人生就是'还可以'三个字，但'还可以'等于'不怎么样'。你有一定的职场竞争力，但随时可能被更年轻、更便宜、更能卷的年轻人取代。赛马再快，也是被人骑着跑的。在这个内卷的时代，你的处境其实挺危险的。找到自己的核心竞争力，不然随时可能被淘汰。", advice: "找到自己的核心竞争力，不然随时可能被年轻人卷下去。" },
            { minScore: 25, maxScore: 39, title: "⚔️ 战马", subtitle: "任劳任怨 · 战场老兵", emoji: "⚔️🐴", tag: "B+", zhaxin: ["战马的下场就是战死", "你的任劳任怨在别人眼里就是好欺负", "努力感动自己，感动老板，感动不了工资卡"], portrait: { tags: ["老黄牛", "加班狂", "职场好人", "背锅侠"], desc: "你是那种什么任务都接、什么锅都背的人。你以为会被认可？但实际上只是软弱。好人不一定有好报。"}, analysis: "你是那种典型的职场老黄牛！什么任务都接，什么活都干，什么锅都背。你以为这样会被认可？但实际上，你的善良在别人眼里只是软弱。你越是这样，别人越是欺负你——反正你不会拒绝反正你不会生气反正你都会做。你的任劳任怨在领导眼里就是'好欺负'，活该你干最多拿最少。战马的下场就是战死——你的身体已经在报警了，自己注意点。工资没涨，职位没升，唯一的收获是一身病和日益稀疏的头发。你的努力感动了自己，感动了老板，但感动不了你的银行账户。会哭的孩子有奶喝，该邀功时要邀功。", advice: "会哭的孩子有奶喝，该邀功时要邀功，别傻傻地埋头干活。" },
            { minScore: 10, maxScore: 24, title: "🐂 耕牛", subtitle: "踏实肯干 · 田间老牛", emoji: "🐂🌾", tag: "B", zhaxin: ["耕牛再努力，也只是耕田的命", "你的努力可能只是感动了自己", "小心变成被宰的老黄牛"], portrait: { tags: ["踏实", "肯干", "普通", "平庸"], desc: "你是那种很努力但天赋一般的人。每天勤勤恳恳，但就是赚不到钱。你的人生就是'还可以'三个字。"}, analysis: "你是那种很努力但天赋一般的人。每天早上第一个到公司，晚上最后一个走，周末也经常加班。你的努力程度连老板都感动，但你的收入就是上不去。你每天勤勤恳恳，但就是赚不到钱。你的人生就是'还可以'三个字，但'还可以'等于'不怎么样'。耕牛再努力，也只是耕田的命。你的努力方向可能有问题，或者你只是看起来很努力而已。找到自己的优势，别一辈子耕田。", advice: "努力要有方向，不然就是瞎忙。找到自己的优势，别一辈子耕田。" },
            { minScore: -5, maxScore: 9, title: "🐎 蒙古马", subtitle: "普通平凡 · 量大管饱", emoji: "🐎🌿", tag: "C+", zhaxin: ["平均就是平庸，平庸就是失败", "你只是看起来很努力", "80%的人都是你这样的分母"], portrait: { tags: ["普通人", "芸芸众生", "分母", "凑数"], desc: "你属于那种'比上不足比下有余'的人。不是最差的，也不是最好的。你的人生就是'还可以'，等于'不怎么样'。"}, analysis: "你是那种'平均水准'的人。你有一定的能力，但没有任何突出的亮点；你努力但不够拼命；你聪明但不够卷。在这个人人都在卷出天际的时代，你的处境很危险——随时可能被更便宜、更年轻、更能卷的人取代。你就像草原上的蒙古马，数量多到数不清，但没人记得住哪一匹是你。平均就是平庸，平庸就是失败。你的人生就是这样高不成低不就。80%的人都是你这样的存在——不是最差的，但也不是最好的。是时候做出改变了，要么卷死别人，要么被别人卷死。", advice: "是时候做出改变了，要么卷死别人，要么被别人卷死。" },
            { minScore: -20, maxScore: -6, title: "🐴 驽马", subtitle: "废马一枚 · 躺平大师", emoji: "🐴😴", tag: "C", zhaxin: ["驽马就是跑不快的马", "你不是在躺平，是在等死", "醒醒吧，你那叫逃避，不叫看透"], portrait: { tags: ["躺平", "咸鱼", "逃避", "自我安慰"], desc: "你是那种'看透了一切'选择躺平的人。但你真的看透了吗？你只是不敢面对失败而已。不是境界高，是不敢努力。"}, analysis: "你是那种'差不多得了'的类型。驽马的意思翻译成人话就是：跑不快的马，既没有千里马的速度，也没有蒙古马的耐力。你可能觉得自己是'人间清醒'，看透了职场套路选择躺平。但我必须残忍地告诉你——醒醒吧，你那不叫躺平，叫逃避。你以为看透了一切，其实你只是害怕面对现实而已。驽马的宿命就是被淘汰。不是被开除，是被时代抛弃。你所谓的'岁月静好'，不过是有人在替你负重前行。你以为你在躺平，其实你只是在等死。躺平是需要资本的，你配吗？", advice: "躺平是需要资本的，你配吗？趁还有机会赶紧起来干活。" },
            { minScore: -35, maxScore: -21, title: "🦓 瘸马", subtitle: "残次品 · 一瘸一拐", emoji: "🦓💔", tag: "C-", zhaxin: ["瘸马的下场就是被淘汰", "你不止能力不行，态度也不行", "起来吧，再瘸也要往前走"], portrait: { tags: ["残次", "迷茫", "困难户", "需要帮"], desc: "你是那种各方面都有问题的人。能力一般，态度一般，运气也一般。最可怕的是你可能还不觉得自己有问题。"}, analysis: "你是那种各方面都有问题的人。你可能觉得自己只是运气不好，或者环境不好，或者机遇不好。但事实是：你不只是某方面不行，你是各方面都不行。能力一般、态度一般、运气一般、长相一般、存款一般...最可怕的是，你可能还不觉得自己有问题。瘸马的下场就是被淘汰。不是因为一次失误，而是因为你一直瘸着。你需要承认自己的问题，然后想办法改变。一瘸一拐不是办法，站起来往前走才是正道。", advice: "承认自己的问题，然后想办法改变。一直瘸着不是办法。" },
            { minScore: -50, maxScore: -36, title: "🫏 驴", subtitle: "拉磨驴 · 原地转圈", emoji: "🫏⚙️", tag: "D+", zhaxin: ["驴的特点就是一直转圈但走不出磨坊", "你忙得要死但不知道在忙什么", "你的努力可能只是感动了自己"], portrait: { tags: ["瞎忙", "转圈", "没方向", "累成狗"], desc: "你是那种'忙得要死但不知道在忙什么'的人。每天加班，但不知道意义在哪。驴拉磨一圈又一圈，你的人生也一样。"}, analysis: "你是那种'忙得要死但不知道在忙什么'的人。每天早上起来就是忙，晚上睡觉前还在忙，周末也在忙。但你忙出了什么？你的银行存款变多了吗？你的职位提升了吗？你的生活变好了吗？没有，你只是越来越累而已。驴的特点就是：一直转圈，但永远走不出那个磨坊。你的努力有意义吗？你的加班真的创造了价值吗？还是只是感动了自己、感动了老板，然后继续下一轮循环？停下来想想自己要什么，别一辈子拉磨。", advice: "停下来想想自己要什么，别一辈子拉磨。" },
            { minScore: -65, maxScore: -51, title: "🦓 骡子", subtitle: "四不像 · 杂牌产物", emoji: "🦓🚫", tag: "D", zhaxin: ["骡子既没有马的速度，也没有驴的耐力", "你什么都想，但什么都不精", "你是那种高不成低不就的尴尬存在"], portrait: { tags: ["四不像", "杂牌", "尴尬", "待回收"], desc: "你什么都学一点，但什么都不精。在这个专精的时代，你这种'全才'就是废物。食之无味，弃之也不可惜。"}, analysis: "你是那种'不知道自己是哪种人'的类型。你什么都想学，什么都想做，但什么都不精。编程学了一点、设计学了一点、营销学了一点、管理学了一点...但没有一样拿得出手。骡子最大的悲哀是：既没有马的奔跑能力，也没有驴的耐力——它甚至没有生育能力，无法延续自己。你就像那个高不成低不就的骡子，想卷卷不过别人，想躺躺不舒服。在这个竞争激烈的社会，你就是一个尴尬的存在——食之无味，弃之也不可惜。四不像的下场就是被遗忘。", advice: "别再自我陶醉了，找一个方向死磕吧。" },
            { minScore: -80, maxScore: -66, title: "🐪 骆驼", subtitle: "负重前行 · 沙漠苦逼", emoji: "🐪🏜️", tag: "D-", zhaxin: ["骆驼再能扛，累死也没人知道", "你的负重前行只是感动自己", "小心变成下一个被压死的骆驼"], portrait: { tags: ["负重", "苦逼", "没人疼", "老黄牛"], desc: "你是那种背着很多负担前行的人。家庭、工作、房贷...样样都要管。但你的苦没人同情，因为这是你自己选择的。"}, analysis: "你是那种背着很多负担前行的人。每个月要还房贷、车贷、信用卡，还有孩子的学费、老人的医药费...你就像一只骆驼，在沙漠里负重前行。但问题是，你的负重可能只是感动了自己。别人只看到你很苦，但不会因为你的苦而同情你。骆驼再能扛，累死在沙漠里也没人知道，更没人心疼。小心变成下一个被压死的骆驼。适当放下一些东西，别把自己压垮。", advice: "学会放下一些东西，别把自己压垮。" },
            { minScore: -95, maxScore: -81, title: "🐷 猪", subtitle: "咸鱼猪 · 躺平王者", emoji: "🐷😴", tag: "E+", zhaxin: ["猪的下场就是被宰", "你只是暂时舒服而已", "醒醒吧，你没有躺平的资本"], portrait: { tags: ["咸鱼", "躺平", "舒服", "待宰"], desc: "你是那种选择彻底躺平的人。每天吃了睡、睡了吃，看起来很舒服。但舒服是要付出代价的，猪的结局就是被宰。"}, analysis: "你是那种选择彻底躺平的人。每天睡到自然醒，下午打打游戏，晚上追追剧，周末就宅在家里。看起来很舒服，但这舒服是用未来换的。你现在舒服了，以后怎么办？猪的下场就是被宰——你现在舒服，等年纪大了，没有技能、没有存款、没有竞争力，你就知道什么叫残忍了。你没有躺平的资本，却在过有资本人的生活。这是危险的。趁还能动赶紧起来，再躺下去就真的废了。", advice: "趁还能动赶紧起来，再躺下去就真的废了。" },
            { minScore: -110, maxScore: -96, title: "🐑 羊", subtitle: "待宰羊 · 温顺小绵羊", emoji: "🐑💀", tag: "E", zhaxin: ["羊的下场就是被宰", "你太温顺了，别人不宰你宰谁", "是该硬气起来了"], portrait: { tags: ["温顺", "好欺负", "待宰", "软柿子"], desc: "你是那种特别好欺负的人。谁都能踩你一脚，你都不敢反抗。羊再温顺，也逃不过被宰的命运。"}, analysis: "你是那种特别好欺负的人。在公司里，谁都能把活推给你做，谁都能把锅甩给你背；在生活中，谁都能占你便宜，谁都能欺负你；甚至在感情里，你也是那个一直付出、从不计较的那个人。你以为这是善良，这是温柔，其实这只是软弱。羊的下场就是被宰——你再温顺，也逃不过被宰的命运。这个社会就是这样欺软怕硬，你太软了，别人不宰你宰谁？硬气起来吧，不然一辈子被人踩。", advice: "硬气起来吧，不然一辈子被人踩。" },
            { minScore: -125, maxScore: -111, title: "🐔 打工鸡", subtitle: "社畜鸡 · 天天打鸣", emoji: "🐔🏃", tag: "E-", zhaxin: ["鸡再努力也只是下蛋", "你的努力只是为了别人致富", "小心变成下一个被宰的鸡"], portrait: { tags: ["社畜", "打工人", "底层", "挣扎"], desc: "你是那种每天辛苦工作但赚不到钱的人。起得比鸡早，睡得比狗晚，赚得比猪少。你的努力只是为了别人致富。"}, analysis: "你是那种每天辛苦工作但赚不到钱的人。每天早上6点起床，挤地铁1小时到公司，晚上9点才能下班，周末还要加班。你的努力程度比任何人都强，但你的收入却比大多数人都低。你就像一只下蛋的鸡，每天努力下蛋，但蛋都被人拿走了，你自己什么都没剩下。起得比鸡早，睡得比狗晚，赚得比猪少。你的努力只是为了别人致富——你的老板换了新车，你却还在挤地铁想办法提升自己的价值，别一辈子当打工鸡。", advice: "想办法提升自己的价值，别一辈子当打工鸡。" },
            { minScore: -140, maxScore: -126, title: "🐕 舔狗", subtitle: "舔到最后 · 一无所有", emoji: "🐕💔", tag: "F+", zhaxin: ["舔狗舔到最后一无所有", "你的真心在别人眼里一文不值", "醒醒吧，你只是感动了自己"], portrait: { tags: ["舔狗", "卑微", "单相思", "工具人"], desc: "你是那种在感情中特别卑微的人。一直付出，但从不被珍惜。舔狗的下场就是一无所有，你的真心只是感动了自己。"}, analysis: "你是那种在感情中特别卑微的人。你喜欢一个人，就一直付出——送礼物、买早餐、随叫随到、每天早安晚安...你以为自己这样做，对方会被感动。但事实是：你的真心在别人眼里一文不值。你只是感动了自己，对方可能还在心里嘲笑你。舔狗舔到最后一无所有——你花了几年时间、花了无数金钱、付出了所有真心，最后换来的只是'我们不合适'。醒醒吧，不是你不够好，是你把感情用错了方式。学会爱自己，别人才会爱你。", advice: "别再舔了，挺直腰杆做个人吧。" },
            { minScore: -155, maxScore: -141, title: "🐱 摸鱼猫", subtitle: "上班摸鱼 · 下班消失", emoji: "🐱🫠", tag: "F", zhaxin: ["猫摸鱼最终会被饿死", "你的摸鱼只是在浪费生命", "小心变成下一个被淘汰的猫"], portrait: { tags: ["摸鱼", "划水", "逃避", "混子"], desc: "你是那种上班摸鱼、下班跑路的人。每天混日子，得过且过。猫不抓老鼠就会被饿死，你摸鱼最终也会被淘汰。"}, analysis: "你是那种上班摸鱼、下班跑路的人。每天到公司就是打开电脑，然后开始刷微博、逛淘宝、聊天追剧。领导布置任务就拖，能推就推，实在不行就随便做做。下班时间一到，一秒都不多待，立刻消失。你以为这样很聪明，但实际上你在浪费自己的生命。猫不抓老鼠就会被饿死——你的技能越来越差，竞争力越来越弱，迟早会被淘汰。这个社会不养闲人，你摸鱼最终也会被淘汰。别再混了，再混下去连饭都吃不上。", advice: "别再混了，再混下去连饭都吃不上。" },
            { minScore: -999, maxScore: -156, title: "🐜 蝼蚁", subtitle: "底层牛马 · 宇宙尘埃", emoji: "🐜💨", tag: "F-", zhaxin: ["蝼蚁就是最低等的存在", "你可能连自己都养不活", "是该彻底醒醒了"], portrait: { tags: ["底层", "牛马", "尘埃", "待拯救"], desc: "你是那种在社会最底层挣扎的人。收入低、没地位、看不到希望。但这就是你的真实状态，接受吧。"}, analysis: "你是那种在社会最底层挣扎的人。每个月工资刚好够交房租和吃饭，存款为0，甚至还要靠花呗度日。你想买什么都买不了，想做什么都做不了。你觉得自己是社会最底层，但这不是最可怕的，最可怕的是你可能已经习惯了这种状态。蝼蚁就是最低等的存在——你可能连自己都养不活，更别说养家了。但这就是你的真实状态，你必须接受。接受现实是改变的第一步，然后想办法突破。再不接受现实你就真的完了。", advice: "承认现实，然后想办法改变。再不接受现实你就真的完了。" }
        ];

        let currentQuestion = 0;
        let totalScore = 0;

        function startTest() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('questionScreen').classList.add('active');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('questionNumber').textContent = `第 ${currentQuestion + 1}/15 题`;
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('progressFill').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
            document.getElementById('options').innerHTML = q.options.map((opt, i) => `<div class="option" onclick="selectOption(${i})">${opt.text}</div>`).join('');
        }

        function selectOption(index) {
            const score = questions[currentQuestion].options[index].score;
            totalScore += score;
            document.querySelectorAll('.option').forEach((el, i) => { if (i === index) el.classList.add('selected'); });
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < questions.length) { showQuestion(); } else { showResult(); }
            }, 400);
        }

        function showResult() {
            document.getElementById('questionScreen').classList.remove('active');
            document.getElementById('resultScreen').classList.add('active');
            let result = results[0];
            for (let r of results) { if (totalScore >= r.minScore && totalScore <= r.maxScore) { result = r; break; } }
            animateValue('scoreValue', 0, totalScore, 1500);
            document.getElementById('resultEmoji').textContent = result.emoji;
            document.getElementById('resultTitle').textContent = result.title;
            document.getElementById('resultSubtitle').textContent = result.subtitle;
            document.getElementById('resultType').innerHTML = `<span class="tag">${result.tag}</span>`;
            document.getElementById('resultDesc').innerHTML = `<p>${result.analysis}</p>`;
            document.getElementById('zhaxinDesc').innerHTML = result.zhaxin.map(z => `<p>${z}</p>`).join('');
            document.getElementById('portraitDesc').innerHTML = `<div class="portrait-tags">${result.portrait.tags.map(t => `<span class="portrait-tag">${t}</span>`).join('')}</div>`;
            document.getElementById('adviceText').textContent = result.advice;
        }

        function animateValue(id, start, end, duration) {
            let obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function restartTest() { currentQuestion = 0; totalScore = 0; document.getElementById('resultScreen').classList.remove('active'); document.getElementById('questionScreen').classList.add('active'); showQuestion(); }
        function goBack() { window.location.href = 'index.html'; }
    </script>
